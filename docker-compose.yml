version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: flask-mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: app_db
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  app:
    image: flask-mysql-app:${VERSION:-latest}
    build: .
    container_name: flask-mysql-app
    environment:
      FLASK_APP: app:create_app
      FLASK_ENV: production
    ports:
      - "9002:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local

networks:
  app-network:
    driver: bridge
